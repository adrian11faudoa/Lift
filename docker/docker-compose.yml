### docker-compose.yml
### Full stack: API + PostgreSQL + Redis (for future job queues) + Nginx

version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ironlog_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ironlog
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ironlog_secret}
      POSTGRES_DB:       ironlog
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironlog"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - ironlog_net

  # ── Redis (future: rate limiting, queues, caching) ──────────
  redis:
    image: redis:7-alpine
    container_name: ironlog_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ironlog_net

  # ── NestJS API ───────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ironlog_api
    restart: unless-stopped
    environment:
      NODE_ENV:      production
      PORT:          3000
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_USER:       ironlog
      DB_PASSWORD:   ${DB_PASSWORD:-ironlog_secret}
      DB_NAME:       ironlog
      DB_SSL:        "false"
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      REDIS_PASSWORD:${REDIS_PASSWORD:-redis_secret}
      JWT_SECRET:    ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: "7d"
      CORS_ORIGIN:   ${CORS_ORIGIN:-*}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ironlog_net
    volumes:
      - api_logs:/app/logs

  # ── Nginx reverse proxy (optional, for production) ───────────
  nginx:
    image: nginx:alpine
    container_name: ironlog_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - ironlog_net
    profiles:
      - production   # Only start with --profile production

volumes:
  postgres_data:
  redis_data:
  api_logs:

networks:
  ironlog_net:
    driver: bridge
