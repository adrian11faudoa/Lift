name: IronLog — Infrastructure (Terraform)

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false   # Never cancel Terraform — could leave state locked

env:
  TF_VERSION:   '1.7.5'
  AWS_REGION:   'us-east-1'
  ENVIRONMENT:  'production'

jobs:
  # ───────────────────────────────────────────────────────────
  # Terraform Validate + Lint
  # ───────────────────────────────────────────────────────────
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive terraform/
        continue-on-error: true

      - name: Comment format result on PR
        if: github.event_name == 'pull_request' && steps.fmt.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Terraform fmt** failed. Run `terraform fmt -recursive terraform/` to fix.'
            })

      - name: Terraform Init (validate only)
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform validate

      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3
      - run: |
          tflint --init
          tflint --recursive terraform/
        continue-on-error: true

  # ───────────────────────────────────────────────────────────
  # Terraform Plan (on PR)
  # ───────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    permissions:
      id-token:      write
      contents:      read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: github-terraform-plan-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          terraform plan \
            -var="image_tag=${{ github.sha }}" \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync(
              'terraform/environments/${{ env.ENVIRONMENT }}/plan_output.txt',
              'utf8'
            );
            // Truncate if too long for GitHub comment
            const truncated = output.length > 65000
              ? output.substring(0, 65000) + '\n... [truncated]'
              : output;

            const exitCode = '${{ steps.plan.outputs.exitcode }}';
            const status   = exitCode === '0' ? '✅' : exitCode === '2' ? '⚠️ Changes' : '❌ Failed';

            const body = `## ${status} Terraform Plan — \`${{ env.ENVIRONMENT }}\`

            <details>
            <summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Commit: \`${{ github.sha }}\` | Workflow: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            // Find existing comment and update, or create new
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existingComment = comments.data.find(c =>
              c.body.includes('Terraform Plan') && c.body.includes('${{ env.ENVIRONMENT }}')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  # ───────────────────────────────────────────────────────────
  # Terraform Apply (on merge to main)
  # ───────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref_name == 'main'
    environment:
      name: infrastructure
      url:  https://console.aws.amazon.com/ecs/home#/clusters/ironlog-prod

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: github-terraform-apply-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          terraform apply \
            -var="image_tag=${{ github.sha }}" \
            -auto-approve \
            -no-color
        timeout-minutes: 30

      - name: Capture outputs
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform output -json > terraform-outputs.json

      - name: Upload Terraform outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform/environments/${{ env.ENVIRONMENT }}/terraform-outputs.json
          retention-days: 5

      - name: Post apply summary
        run: |
          echo "## ✅ Terraform Applied Successfully" >> $GITHUB_STEP_SUMMARY
          echo "Environment: **${{ env.ENVIRONMENT }}**" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Outputs" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat terraform/environments/${{ env.ENVIRONMENT }}/terraform-outputs.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
